spring.application.name=inventarios

#Conexion a mysql - usa variables de entorno de Railway
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Config patron de log
logging.pattern.console=[%thread] %-5level: %logger - %msg%n
# configurar nivel de log
loggin.level.root=INFO
#configurar por niveles, por paquetes
#loggin.level.gm.invetarios=DEBUG
spring.main.banner-mode=off